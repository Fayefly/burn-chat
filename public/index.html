<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Burn Chat - 阅后即焚</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #111113;
      --surface: #18181b;
      --surface2: #27272a;
      --bubble: #2c2c30;
      --accent: #ef4444;
      --accent-glow: rgba(239, 68, 68, 0.25);
      --text: #fafafa;
      --text-secondary: #a1a1aa;
      --text-dim: #71717a;
      --border: #2e2e32;
      --green: #22c55e;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      overflow: hidden;
    }

    /* Screens */
    .screen { display: none; height: 100dvh; }
    .screen.active { display: flex; flex-direction: column; align-items: center; justify-content: center; }

    /* Home screen */
    #home-screen {
      gap: 28px;
      padding: 24px;
    }

    .logo { font-size: 52px; margin-bottom: 8px; }

    h1 {
      font-size: 30px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .subtitle {
      color: var(--text-dim);
      font-size: 14px;
      margin-top: 6px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
      max-width: 320px;
    }

    input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    input::placeholder { color: var(--text-dim); }

    .btn {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 14px 24px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
    }

    .btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-secondary);
    }

    .btn-ghost:hover { border-color: var(--text-dim); }

    .divider {
      color: var(--text-dim);
      font-size: 13px;
      margin: 2px 0;
      text-align: center;
    }

    /* ============ Chat screen ============ */
    #chat-screen { justify-content: flex-start; }

    #chat-screen.active {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .chat-wrapper {
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 800px;
      height: 100%;
    }

    /* Header */
    .chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      background: var(--bg);
    }

    .chat-header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .room-id {
      font-size: 14px;
      color: var(--text-secondary);
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-weight: 500;
    }

    .countdown {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 15px;
      font-weight: 600;
      color: var(--accent);
      font-family: 'SF Mono', 'Fira Code', monospace;
    }

    .countdown.urgent {
      animation: flash 0.5s infinite;
    }

    @keyframes flash {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Messages area */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Message row with avatar */
    .message-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      max-width: 70%;
    }

    .message-row.mine {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .message-row.theirs {
      align-self: flex-start;
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 600;
      flex-shrink: 0;
      color: var(--text-secondary);
    }

    .avatar.mine {
      background: var(--surface2);
    }

    .message {
      padding: 10px 16px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.5;
      word-wrap: break-word;
      background: var(--bubble);
      color: var(--text);
    }

    .message.mine {
      background: var(--bubble);
      border-bottom-right-radius: 6px;
    }

    .message.theirs {
      border-bottom-left-radius: 6px;
    }

    .message.system {
      align-self: center;
      background: transparent;
      color: var(--text-dim);
      font-size: 12px;
      padding: 6px 0;
      text-align: center;
      line-height: 1.6;
    }

    /* Input area */
    .chat-input {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 24px 32px 24px;
      background: var(--bg);
    }

    .chat-input input {
      flex: 1;
      border-radius: 999px;
      padding: 13px 22px;
      background: var(--surface2);
      border: none;
      font-size: 15px;
    }

    .chat-input input:focus {
      box-shadow: none;
      background: var(--surface2);
      outline: none;
    }

    .send-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--surface2);
      border: none;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .send-btn:hover {
      background: var(--text-secondary);
      color: var(--bg);
    }

    .send-btn svg {
      width: 18px;
      height: 18px;
    }

    /* ============ Burned screen ============ */
    #burned-screen { gap: 16px; }

    .burn-icon {
      font-size: 80px;
      animation: burnAnim 2s ease-in-out;
    }

    @keyframes burnAnim {
      0% { transform: scale(0.5); opacity: 0; }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); opacity: 1; }
    }

    .burn-text {
      font-size: 24px;
      font-weight: 700;
      color: var(--accent);
    }

    .burn-sub {
      color: var(--text-dim);
      font-size: 14px;
    }

    /* ============ Share modal ============ */
    .share-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .share-overlay.active { display: flex; }

    .share-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px;
      max-width: 380px;
      width: 100%;
      text-align: center;
    }

    .share-box h3 { margin-bottom: 12px; font-size: 18px; }

    .share-link {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 13px;
      word-break: break-all;
      margin: 14px 0;
      color: var(--text);
    }

    .share-hint {
      color: var(--text-dim);
      font-size: 12px;
      margin-top: 10px;
    }

    /* ============ Waiting ============ */
    .waiting-text {
      color: var(--text-dim);
      font-size: 13px;
      text-align: center;
      padding: 40px 20px;
    }

    /* Scrollbar */
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>
  <!-- Home Screen -->
  <div id="home-screen" class="screen active">
    <div class="logo">🔥</div>
    <h1>Burn Chat</h1>
    <p class="subtitle">阅后即焚 · 30分钟自动销毁</p>
    <div class="input-group">
      <input id="nickname-input" type="text" placeholder="你的昵称" maxlength="12">
      <button class="btn" onclick="createRoom()">创建私密房间</button>
      <div class="divider">— 或输入房间号加入 —</div>
      <input id="room-input" type="text" placeholder="房间号" maxlength="8">
      <button class="btn btn-ghost" onclick="joinExistingRoom()">加入房间</button>
    </div>
  </div>

  <!-- Chat Screen -->
  <div id="chat-screen" class="screen">
    <div class="chat-wrapper">
      <div class="chat-header">
        <div class="chat-header-left">
          <div class="status-dot"></div>
          <span class="room-id" id="display-room-id"></span>
        </div>
        <div class="countdown" id="countdown">
          <span id="countdown-text">等待第一条消息...</span>
        </div>
      </div>
      <div class="messages" id="messages">
        <div class="waiting-text" id="waiting-hint">等待对方加入...</div>
      </div>
      <div class="chat-input">
        <input id="msg-input" type="text" placeholder="输入消息..." autocomplete="off">
        <button class="send-btn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
            <path d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94l18.04-7.94a.75.75 0 000-1.38L3.478 2.405z"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Burned Screen -->
  <div id="burned-screen" class="screen">
    <div class="burn-icon">🔥</div>
    <div class="burn-text">已焚毁</div>
    <p class="burn-sub">所有消息已永久销毁</p>
    <button class="btn" style="max-width:200px; margin-top:20px;" onclick="goHome()">返回首页</button>
  </div>

  <!-- Share Overlay -->
  <div class="share-overlay" id="share-overlay">
    <div class="share-box">
      <h3>分享房间链接</h3>
      <p style="color:var(--text-dim); font-size:13px;">将链接发给对方即可开始对话</p>
      <div class="share-link" id="share-link"></div>
      <button class="btn" onclick="copyLink()">复制链接</button>
      <p class="share-hint">对方加入后即可聊天，30分钟后自动焚毁</p>
    </div>
  </div>

  <script>
    const socket = io({
      reconnection: true,
      reconnectionDelay: 1000,
      reconnectionDelayMax: 5000,
      reconnectionAttempts: 20
    });
    let currentRoomId = null;
    let myUserId = null;
    let countdownInterval = null;
    let countdownEnd = null;
    let myNickname = '';
    let wasConnected = false;

    // Check if URL has a room
    const pathMatch = window.location.pathname.match(/^\/room\/([a-z0-9]+)$/i);
    if (pathMatch) {
      const roomId = pathMatch[1];
      document.getElementById('room-input').value = roomId;
    }

    socket.on('connect', () => {
      // If we were previously in a room, try to rejoin
      if (currentRoomId && myUserId && wasConnected) {
        socket.emit('join-room', {
          roomId: currentRoomId,
          name: myNickname,
          reconnectUserId: myUserId
        });
      }
    });

    socket.on('your-user-id', ({ userId }) => {
      myUserId = userId;
      wasConnected = true;
    });

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function getNickname() {
      return document.getElementById('nickname-input').value.trim() || '匿名';
    }

    async function createRoom() {
      const res = await fetch('/api/create-room');
      const { roomId } = await res.json();
      currentRoomId = roomId;
      history.pushState(null, '', `/room/${roomId}`);
      const link = `${window.location.origin}/room/${roomId}`;
      document.getElementById('share-link').textContent = link;
      document.getElementById('share-overlay').classList.add('active');
      joinRoom(roomId);
    }

    function joinExistingRoom() {
      const roomId = document.getElementById('room-input').value.trim();
      if (!roomId) return;
      currentRoomId = roomId;
      history.pushState(null, '', `/room/${roomId}`);
      joinRoom(roomId);
    }

    function joinRoom(roomId) {
      showScreen('chat-screen');
      document.getElementById('display-room-id').textContent = `#${roomId}`;
      myNickname = getNickname();
      socket.emit('join-room', { roomId, name: myNickname });
    }

    function copyLink() {
      const link = document.getElementById('share-link').textContent;
      navigator.clipboard.writeText(link).then(() => {
        const btn = document.querySelector('.share-box .btn');
        btn.textContent = '已复制 ✓';
        setTimeout(() => { btn.textContent = '复制链接'; }, 2000);
      });
    }

    function sendMessage() {
      const input = document.getElementById('msg-input');
      const text = input.value.trim();
      if (!text) return;
      socket.emit('send-message', { text });
      input.value = '';
      input.focus();
    }

    document.getElementById('msg-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    // Socket events
    socket.on('user-joined', ({ name, userCount }) => {
      addSystemMessage(`${name} 加入了房间`);
      if (userCount >= 2) {
        document.getElementById('waiting-hint').style.display = 'none';
        document.getElementById('share-overlay').classList.remove('active');
      }
    });

    socket.on('user-left', ({ name }) => {
      addSystemMessage(`${name} 离开了房间`);
    });

    socket.on('user-disconnected', ({ name }) => {
      addSystemMessage(`${name} 网络断开，等待重连...`);
    });

    socket.on('user-reconnected', ({ name, userCount }) => {
      addSystemMessage(`${name} 已重新连接`);
      if (userCount >= 2) {
        document.getElementById('waiting-hint').style.display = 'none';
        document.getElementById('share-overlay').classList.remove('active');
      }
    });

    socket.on('new-message', (msg) => {
      const isMine = msg.senderId === myUserId;
      addMessage(msg.text, isMine, msg.sender);
    });

    socket.on('countdown-started', ({ duration }) => {
      startCountdown(duration);
    });

    socket.on('countdown-sync', ({ remaining }) => {
      startCountdown(remaining);
    });

    socket.on('room-burned', () => {
      clearInterval(countdownInterval);
      showScreen('burned-screen');
    });

    socket.on('error-msg', ({ message }) => {
      alert(message);
      showScreen('home-screen');
    });

    function addMessage(text, isMine, senderName) {
      // Hide waiting hint on first message
      const hint = document.getElementById('waiting-hint');
      if (hint && hint.style.display !== 'none') hint.style.display = 'none';

      const row = document.createElement('div');
      row.className = `message-row ${isMine ? 'mine' : 'theirs'}`;

      const avatar = document.createElement('div');
      avatar.className = `avatar${isMine ? ' mine' : ''}`;
      avatar.textContent = (senderName || '?')[0].toUpperCase();

      const bubble = document.createElement('div');
      bubble.className = `message ${isMine ? 'mine' : 'theirs'}`;
      bubble.textContent = text;

      row.appendChild(avatar);
      row.appendChild(bubble);

      const container = document.getElementById('messages');
      container.appendChild(row);
      container.scrollTop = container.scrollHeight;
    }

    function addSystemMessage(text) {
      const div = document.createElement('div');
      div.className = 'message system';
      div.textContent = text;
      const container = document.getElementById('messages');
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    function startCountdown(durationMs) {
      countdownEnd = Date.now() + durationMs;
      clearInterval(countdownInterval);
      updateCountdown();
      countdownInterval = setInterval(updateCountdown, 1000);
    }

    function updateCountdown() {
      const remaining = Math.max(0, countdownEnd - Date.now());
      const minutes = Math.floor(remaining / 60000);
      const seconds = Math.floor((remaining % 60000) / 1000);
      const el = document.getElementById('countdown-text');
      el.textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;

      const container = document.getElementById('countdown');
      if (remaining < 60000) {
        container.classList.add('urgent');
      } else {
        container.classList.remove('urgent');
      }

      if (remaining <= 0) clearInterval(countdownInterval);
    }

    function goHome() {
      history.pushState(null, '', '/');
      showScreen('home-screen');
    }
  </script>
</body>
</html>

  <script src="/socket.io/socket.io.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #F8F9FB;
      --surface: #FFFFFF;
      --text: #1a1a1a;
      --text-secondary: #6b6b6b;
      --text-dim: #999;
      --border: #e5e5e5;
      --green: #10a37f;
      --purple: #7c5cfc;
      --purple-light: #B7A4FF;
      --purple-bg: #F6F0FF;
      --purple-send: #7c5cfc;
      --purple-hover: #6a4de0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Söhne', 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      overflow: hidden;
      position: relative;
    }

    /* Subtle watermark texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23000000' fill-opacity='0.025'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* ============ Screens ============ */
    .screen { display: none; height: 100dvh; position: relative; z-index: 1; }
    .screen.active { display: flex; flex-direction: column; align-items: center; justify-content: center; }

    /* ============ Home Screen ============ */
    #home-screen { gap: 24px; padding: 24px; }

    .home-logo {
      width: 56px; height: 56px;
      background: var(--green);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }

    .home-logo svg { width: 32px; height: 32px; color: white; }

    #home-screen h1 { font-size: 28px; font-weight: 600; color: var(--text); }
    #home-screen .subtitle { color: var(--text-secondary); font-size: 15px; }

    .input-group {
      display: flex; flex-direction: column; gap: 12px;
      width: 100%; max-width: 360px;
    }

    input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: var(--purple-light); }
    input::placeholder { color: #bbb; }

    .btn {
      background: var(--purple);
      color: white; border: none; border-radius: 12px;
      padding: 14px 24px; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: all 0.2s; width: 100%;
    }

    .btn:hover { background: var(--purple-hover); }

    .btn-ghost {
      background: transparent; border: 1px solid var(--border); color: var(--text-secondary);
    }

    .btn-ghost:hover { border-color: var(--text-dim); background: rgba(0,0,0,0.02); }

    .divider { color: var(--text-dim); font-size: 13px; text-align: center; }

    /* ============ Chat Screen ============ */
    #chat-screen { justify-content: flex-start; }
    #chat-screen.active { display: flex; flex-direction: column; align-items: stretch; }

    /* Top bar */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 20px;
      background: var(--bg);
      position: relative; z-index: 10;
    }

    .topbar-left { display: flex; align-items: center; gap: 10px; }

    .topbar-logo {
      width: 28px; height: 28px;
      background: var(--green);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .topbar-logo svg { width: 16px; height: 16px; color: white; }

    .topbar-model {
      font-size: 15px; font-weight: 600; color: var(--text);
    }

    .topbar-online {
      font-size: 13px; color: var(--text-secondary);
      display: flex; align-items: center; gap: 5px;
    }

    .topbar-online::before {
      content: '';
      width: 6px; height: 6px;
      background: var(--green);
      border-radius: 50%;
      display: inline-block;
    }

    .topbar-countdown {
      font-size: 13px; color: #e74c3c; font-weight: 500;
      margin-left: 16px;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }

    .topbar-countdown.urgent { animation: flash 0.5s infinite; }
    @keyframes flash { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .topbar-right { display: flex; align-items: center; gap: 10px; }

    .topbar-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 13px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s;
    }

    .topbar-btn:hover { background: rgba(0,0,0,0.04); border-color: #ccc; }

    /* Messages area */
    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 0;
    }

    .messages-inner {
      max-width: 780px;
      margin: 0 auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* AI message (their side) */
    .msg-ai {
      display: flex;
      gap: 16px;
      padding: 20px 0;
      border-bottom: 1px solid #eee;
    }

    .msg-ai-avatar {
      width: 32px; height: 32px;
      background: var(--green);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .msg-ai-avatar svg { width: 18px; height: 18px; color: white; }

    .msg-ai-content { flex: 1; min-width: 0; }

    .msg-ai-model {
      font-size: 13px; font-weight: 600; color: var(--text);
      margin-bottom: 6px;
    }

    .msg-ai-text {
      font-size: 15px; line-height: 1.7; color: var(--text);
      word-wrap: break-word;
    }

    /* AI Supplement — same style as message text */
    .msg-supplement {
      margin-top: 8px;
      font-size: 15px;
      line-height: 1.7;
      color: var(--text);
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    /* AI message toolbar */
    .msg-toolbar {
      display: flex; align-items: center; gap: 2px;
      margin-top: 10px;
    }

    .msg-toolbar-btn {
      width: 30px; height: 30px;
      border: none; background: transparent;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: #bbb;
      transition: all 0.15s;
    }

    .msg-toolbar-btn:hover { background: rgba(0,0,0,0.06); color: #888; }

    .msg-toolbar-btn svg { width: 16px; height: 16px; }

    .msg-eval {
      display: flex; gap: 6px; margin-left: 12px;
    }

    .msg-eval-btn {
      border: 1px solid #e0e0e0;
      background: transparent;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
      color: #999;
      cursor: pointer;
      transition: all 0.15s;
    }

    .msg-eval-btn:hover { background: rgba(0,0,0,0.04); border-color: #ccc; }

    /* User message (my side) */
    .msg-user {
      display: flex;
      justify-content: flex-end;
      padding: 16px 0;
    }

    .msg-user-bubble {
      background: var(--purple-bg);
      border-radius: 16px;
      padding: 12px 18px;
      max-width: 520px;
      font-size: 15px;
      line-height: 1.6;
      color: var(--text);
      word-wrap: break-word;
    }

    /* System message */
    .msg-system {
      text-align: center;
      font-size: 13px;
      color: var(--text-dim);
      padding: 12px 0;
    }

    /* Waiting */
    .waiting-text {
      text-align: center;
      font-size: 14px;
      color: var(--text-dim);
      padding: 60px 20px;
    }

    /* Share banner */
    .share-banner {
      display: none;
      align-items: center;
      justify-content: space-between;
      padding: 8px 20px;
      background: #F0EDFF;
      border-bottom: 1px solid #e5e0f5;
    }

    .share-banner.active { display: flex; }

    .share-banner-text {
      color: var(--text-secondary);
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      margin-right: 10px;
    }

    .share-banner-btn {
      background: var(--purple);
      border: none;
      border-radius: 8px;
      padding: 5px 14px;
      color: white;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }

    .share-banner-btn:hover { background: var(--purple-hover); }

    /* ============ Input area ============ */
    .input-area {
      padding: 0 20px 28px;
      background: var(--bg);
    }

    .input-card {
      max-width: 780px;
      margin: 0 auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 14px 18px 10px;
      display: flex;
      flex-direction: column;
    }

    .input-card textarea {
      width: 100%;
      border: none;
      outline: none;
      resize: none;
      font-size: 15px;
      line-height: 1.5;
      color: var(--text);
      background: transparent;
      font-family: inherit;
      padding: 4px 0;
      max-height: 120px;
    }

    .input-card textarea::placeholder { color: #bbb; }

    .input-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 6px;
    }

    .input-left-btns {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .input-icon-btn {
      width: 34px; height: 34px;
      border: none;
      background: transparent;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: #bbb;
      transition: all 0.15s;
    }

    .input-icon-btn:hover { background: rgba(0,0,0,0.06); color: #888; }
    .input-icon-btn svg { width: 18px; height: 18px; }

    .send-circle {
      width: 34px; height: 34px;
      background: var(--green);
      border: none;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all 0.15s;
      color: white;
    }

    .send-circle:hover { background: #0d8a6b; transform: scale(1.05); }
    .send-circle svg { width: 16px; height: 16px; }

    /* ============ Burned screen ============ */
    #burned-screen { gap: 16px; }

    .burn-icon { font-size: 80px; animation: burnAnim 1.5s ease-out; }
    @keyframes burnAnim { 0%{transform:scale(0.5);opacity:0} 50%{transform:scale(1.2)} 100%{transform:scale(1);opacity:1} }
    .burn-text { font-size: 24px; font-weight: 700; color: #e74c3c; }
    .burn-sub { color: var(--text-dim); font-size: 14px; }

    /* ============ Nickname Modal ============ */
    .nickname-overlay {
      display: none; position: fixed; inset: 0;
      background: var(--bg); z-index: 200;
      align-items: center; justify-content: center; padding: 24px;
    }

    .nickname-overlay.active { display: flex; }

    .nickname-box { text-align: center; max-width: 360px; width: 100%; }
    .nickname-box h2 { font-size: 22px; margin-bottom: 6px; font-weight: 600; }
    .nickname-box p { color: var(--text-secondary); font-size: 14px; margin-bottom: 20px; }
    .nickname-box input { width: 100%; margin-bottom: 14px; }

    /* Scrollbar */
    .messages-area::-webkit-scrollbar { width: 5px; }
    .messages-area::-webkit-scrollbar-track { background: transparent; }
    .messages-area::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }
    .messages-area::-webkit-scrollbar-thumb:hover { background: #ccc; }

    /* Image in messages */
    .msg-image {
      max-width: 280px;
      max-height: 280px;
      border-radius: 12px;
      margin-top: 8px;
      cursor: pointer;
      object-fit: cover;
      transition: transform 0.15s;
    }

    .msg-image:hover { transform: scale(1.02); }

    .msg-user .msg-image {
      margin-left: auto;
      display: block;
    }

    /* Image preview in input area */
    .image-preview-bar {
      display: none;
      padding: 8px 0 4px;
      gap: 8px;
      align-items: center;
    }

    .image-preview-bar.active { display: flex; }

    .image-preview-thumb {
      position: relative;
      width: 56px; height: 56px;
      border-radius: 8px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .image-preview-thumb img {
      width: 100%; height: 100%;
      object-fit: cover;
    }

    .image-preview-remove {
      position: absolute;
      top: 2px; right: 2px;
      width: 18px; height: 18px;
      background: rgba(0,0,0,0.5);
      border: none;
      border-radius: 50%;
      color: white;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .image-preview-remove:hover { background: rgba(0,0,0,0.7); }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 300;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }

    .lightbox.active { display: flex; }

    .lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      border-radius: 8px;
      object-fit: contain;
    }
  </style>
</head>
<body>
  <!-- Home Screen -->
  <div id="home-screen" class="screen active">
    <div class="home-logo">

  <!-- Nickname Modal -->

  <script>
    const socket = io({
      reconnection: true,
      reconnectionDelay: 1000,
      reconnectionDelayMax: 5000,
      reconnectionAttempts: 20
    });
    let currentRoomId = null;
    let myUserId = null;
    let countdownInterval = null;
    let countdownEnd = null;
    let myNickname = '';
    let wasConnected = false;
    let pendingRoomId = null;
    let shareLink = '';
    let onlineUsers = 1;

    const pathMatch = window.location.pathname.match(/^\/room\/(.+)$/i);
    if (pathMatch) {
      pendingRoomId = decodeURIComponent(pathMatch[1]);
      document.getElementById('nickname-overlay').classList.add('active');
    }

    document.getElementById('link-nickname-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') joinFromLink();
    });

    // Auto-resize textarea
    const textarea = document.getElementById('msg-input');
    textarea.addEventListener('input', () => {
      textarea.style.height = 'auto';
      textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
    });

    // === Image paste & upload ===
    let pendingImage = null; // { data: 'base64...', mime: 'image/png' }

    function compressImage(dataUrl, maxSize = 800) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          let w = img.width, h = img.height;
          if (w > maxSize || h > maxSize) {
            if (w > h) { h = Math.round(h * maxSize / w); w = maxSize; }
            else { w = Math.round(w * maxSize / h); h = maxSize; }
          }
          canvas.width = w;
          canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL('image/jpeg', 0.8));
        };
        img.src = dataUrl;
      });
    }

    function showImagePreview(dataUrl) {
      document.getElementById('image-preview-img').src = dataUrl;
      document.getElementById('image-preview-bar').classList.add('active');
    }

    function removePendingImage() {
      pendingImage = null;
      document.getElementById('image-preview-bar').classList.remove('active');
      document.getElementById('file-input').value = '';
    }

    async function handleImageFile(file) {
      if (!file || !file.type.startsWith('image/')) return;
      if (file.size > 5 * 1024 * 1024) {
        alert('图片太大（最大5MB），请压缩后重试');
        return;
      }
      const reader = new FileReader();
      reader.onload = async () => {
        const compressed = await compressImage(reader.result);
        // Extract base64 data (remove data:image/xxx;base64, prefix)
        const base64 = compressed.split(',')[1];
        pendingImage = { data: base64, mime: 'image/jpeg' };
        showImagePreview(compressed);
      };
      reader.readAsDataURL(file);
    }

    // Paste handler — capture images from clipboard
    document.addEventListener('paste', (e) => {
      if (!currentRoomId) return;
      const items = e.clipboardData?.items;
      if (!items) return;
      for (const item of items) {
        if (item.type.startsWith('image/')) {
          e.preventDefault();
          const file = item.getAsFile();
          handleImageFile(file);
          return;
        }
      }
    });

    // File input handler
    document.getElementById('file-input').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) handleImageFile(file);
    });

    // Lightbox
    function openLightbox(src) {
      document.getElementById('lightbox-img').src = src;
      document.getElementById('lightbox').classList.add('active');
    }
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('active');
    }

    socket.on('connect', () => {
      if (currentRoomId && myUserId && wasConnected) {
        socket.emit('join-room', {
          roomId: currentRoomId,
          name: myNickname,
          reconnectUserId: myUserId
        });
      }
    });

    socket.on('your-user-id', ({ userId }) => {
      myUserId = userId;
      wasConnected = true;
    });

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function getNickname() {
      return document.getElementById('nickname-input').value.trim() || '匿名';
    }

    async function createRoom() {
      const res = await fetch('/api/create-room');
      const { roomId } = await res.json();
      currentRoomId = roomId;
      const encodedId = encodeURIComponent(roomId);
      history.pushState(null, '', `/room/${encodedId}`);
      shareLink = `${window.location.origin}/room/${encodedId}`;
      document.getElementById('share-banner-link').textContent = shareLink;
      document.getElementById('share-banner').classList.add('active');
      joinRoom(roomId);
    }

    function joinFromLink() {
      const name = document.getElementById('link-nickname-input').value.trim();
      if (!name) { document.getElementById('link-nickname-input').focus(); return; }
      myNickname = name;
      document.getElementById('nickname-overlay').classList.remove('active');
      currentRoomId = pendingRoomId;
      const encodedId = encodeURIComponent(pendingRoomId);
      history.replaceState(null, '', `/room/${encodedId}`);
      shareLink = `${window.location.origin}/room/${encodedId}`;
      joinRoom(pendingRoomId);
    }

    function joinExistingRoom() {
      const roomId = document.getElementById('room-input').value.trim();
      if (!roomId) return;
      pendingRoomId = roomId;
      document.getElementById('nickname-overlay').classList.add('active');
    }

    function joinRoom(roomId) {
      showScreen('chat-screen');
      document.getElementById('display-room-id').textContent = roomId;
      if (!myNickname) myNickname = getNickname();
      socket.emit('join-room', { roomId, name: myNickname });
    }

    function copyLink() {
      navigator.clipboard.writeText(shareLink).then(() => {
        const btn = document.querySelector('.share-banner-btn');
        btn.textContent = '已复制 ✓';
        setTimeout(() => { btn.textContent = '复制链接'; }, 2000);
      });
    }

    function copyShareLink() {
      if (!shareLink) {
        shareLink = window.location.href;
      }
      navigator.clipboard.writeText(shareLink).then(() => {
        const btn = document.querySelector('.topbar-right .topbar-btn');
        btn.textContent = '已复制 ✓';
        setTimeout(() => { btn.textContent = '复制链接'; }, 2000);
      });
    }

    function sendMessage() {
      const input = document.getElementById('msg-input');
      const text = input.value.trim();
      if (!text && !pendingImage) return;
      const payload = { text };
      if (pendingImage) {
        payload.image = pendingImage;
      }
      socket.emit('send-message', payload);
      input.value = '';
      input.style.height = 'auto';
      removePendingImage();
      input.focus();
    }

    document.getElementById('msg-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) {
        e.preventDefault();
        sendMessage();
      }
    });

    // Socket events
    socket.on('user-joined', ({ name, userCount }) => {
      addSystemMessage(`${name} 加入了房间`);
      onlineUsers = userCount;
      document.getElementById('online-count').textContent = userCount;
      if (userCount >= 2) {
        document.getElementById('waiting-hint').style.display = 'none';
        document.getElementById('share-banner').classList.remove('active');
      }
    });

    socket.on('user-left', ({ name, userCount }) => {
      addSystemMessage(`${name} 离开了房间`);
      onlineUsers = userCount;
      document.getElementById('online-count').textContent = userCount;
    });

    socket.on('user-disconnected', ({ name }) => {
      addSystemMessage(`${name} 网络断开，等待重连...`);
    });

    socket.on('user-reconnected', ({ name, userCount }) => {
      addSystemMessage(`${name} 已重新连接`);
      onlineUsers = userCount;
      document.getElementById('online-count').textContent = userCount;
      if (userCount >= 2) {
        document.getElementById('waiting-hint').style.display = 'none';
        document.getElementById('share-banner').classList.remove('active');
      }
    });

    socket.on('new-message', (msg) => {
      const isMine = msg.senderId === myUserId;
      addMessage(msg.text, isMine, msg.sender, msg.id, msg.image);
    });

    socket.on('ai-supplement', ({ forMessageId, text, senderId }) => {
      // Only show supplement for the OTHER person's messages
      if (senderId === myUserId) return;

      const msgEl = document.querySelector(`[data-msg-id="${forMessageId}"]`);
      if (!msgEl) return;

      const supplement = document.createElement('div');
      supplement.className = 'msg-supplement';

      // Insert supplement BEFORE the toolbar icons
      const contentArea = msgEl.querySelector('.msg-ai-content');
      if (contentArea) {
        const toolbar = contentArea.querySelector('.msg-toolbar');
        if (toolbar) {
          contentArea.insertBefore(supplement, toolbar);
        } else {
          contentArea.appendChild(supplement);
        }
      }

      // Typewriter effect: reveal characters one by one
      let charIndex = 0;
      const totalChars = text.length;
      const area = document.querySelector('.messages-area');

      function typeChar() {
        if (charIndex < totalChars) {
          // Add multiple characters at once for speed on longer texts
          const chunk = Math.min(2, totalChars - charIndex);
          supplement.textContent = text.substring(0, charIndex + chunk);
          charIndex += chunk;
          area.scrollTop = area.scrollHeight;
          setTimeout(typeChar, 18);
        }
      }
      typeChar();
    });

    socket.on('countdown-started', ({ duration }) => { startCountdown(duration); });
    socket.on('countdown-sync', ({ remaining }) => { startCountdown(remaining); });

    socket.on('room-burned', () => {
      clearInterval(countdownInterval);
      showScreen('burned-screen');
    });

    socket.on('error-msg', ({ message }) => {
      alert(message);
      showScreen('home-screen');
    });

    // Message rendering
    function addMessage(text, isMine, senderName, messageId, image) {
      const hint = document.getElementById('waiting-hint');
      if (hint && hint.style.display !== 'none') hint.style.display = 'none';

      const container = document.getElementById('messages');

      // Build image element if present
      let imgEl = null;
      if (image && image.data) {
        imgEl = document.createElement('img');
        imgEl.className = 'msg-image';
        imgEl.src = `data:${image.mime || 'image/jpeg'};base64,${image.data}`;
        imgEl.onclick = () => openLightbox(imgEl.src);
        imgEl.alt = '图片';
      }

      if (isMine) {
        // User message — right aligned purple bubble
        const div = document.createElement('div');
        div.className = 'msg-user';
        if (messageId) div.dataset.msgId = messageId;
        const bubble = document.createElement('div');
        bubble.className = 'msg-user-bubble';
        if (text) bubble.textContent = text;
        if (imgEl) bubble.appendChild(imgEl);
        div.appendChild(bubble);
        container.appendChild(div);
      } else {
        // AI message — left side with avatar, no bubble
        const div = document.createElement('div');
        div.className = 'msg-ai';
        if (messageId) div.dataset.msgId = messageId;

        // Avatar
        const avatar = document.createElement('div');
        avatar.className = 'msg-ai-avatar';
        avatar.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M22.2819 9.8211a5.9847 5.9847 0 0 0-.5157-4.9108 6.0462 6.0462 0 0 0-6.5098-2.9A6.0651 6.0651 0 0 0 4.9807 4.1818a5.9847 5.9847 0 0 0-3.9977 2.9 6.0462 6.0462 0 0 0 .7427 7.0966 5.98 5.98 0 0 0 .511 4.9107 6.051 6.051 0 0 0 6.5146 2.9001A5.9847 5.9847 0 0 0 13.2599 24a6.0557 6.0557 0 0 0 5.7718-4.2058 5.9894 5.9894 0 0 0 3.9977-2.9001 6.0557 6.0557 0 0 0-.7475-7.0729zm-9.022 12.6081a4.4755 4.4755 0 0 1-2.8764-1.0408l.1419-.0804 4.7783-2.7582a.7948.7948 0 0 0 .3927-.6813v-6.7369l2.02 1.1686a.071.071 0 0 1 .038.052v5.5826a4.504 4.504 0 0 1-4.4945 4.4944zm-9.6607-4.1254a4.4708 4.4708 0 0 1-.5346-3.0137l.142.0852 4.783 2.7582a.7712.7712 0 0 0 .7806 0l5.8428-3.3685v2.3324a.0804.0804 0 0 1-.0332.0615L9.74 19.9502a4.4992 4.4992 0 0 1-6.1408-1.6464zM2.3408 7.8956a4.485 4.485 0 0 1 2.3655-1.9728V11.6a.7664.7664 0 0 0 .3879.6765l5.8144 3.3543-2.0201 1.1685a.0757.0757 0 0 1-.071 0l-4.8303-2.7865A4.504 4.504 0 0 1 2.3408 7.8956zm16.5963 3.8558L13.1038 8.364 15.1192 7.2a.0757.0757 0 0 1 .071 0l4.8303 2.7913a4.4944 4.4944 0 0 1-.6765 8.1042v-5.6772a.79.79 0 0 0-.407-.667zm2.0107-3.0231l-.142-.0852-4.7735-2.7629a.7759.7759 0 0 0-.7854 0L9.409 9.2484V6.916a.0662.0662 0 0 1 .0284-.0615l4.8303-2.7866a4.4992 4.4992 0 0 1 6.6802 4.66zM8.3065 12.863l-2.02-1.1638a.0804.0804 0 0 1-.038-.0567V6.0742a4.4992 4.4992 0 0 1 7.4757-3.4537l-.142.0805L8.804 5.459a.7948.7948 0 0 0-.3927.6813zm1.0974-2.3616l2.603-1.5018 2.6032 1.5018v3.0036l-2.6032 1.5018-2.603-1.5018z"/></svg>';

        // Content
        const content = document.createElement('div');
        content.className = 'msg-ai-content';

        const model = document.createElement('div');
        model.className = 'msg-ai-model';
        model.textContent = senderName || 'Burn Chat';

        const textDiv = document.createElement('div');
        textDiv.className = 'msg-ai-text';
        if (text) textDiv.textContent = text;
        if (imgEl) textDiv.appendChild(imgEl);

        content.appendChild(model);
        content.appendChild(textDiv);

        const toolbar = document.createElement('div');

        div.appendChild(avatar);
        div.appendChild(content);
        container.appendChild(div);
      }

      const area = document.querySelector('.messages-area');
      area.scrollTop = area.scrollHeight;
    }

    function addSystemMessage(text) {
      const div = document.createElement('div');
      div.className = 'msg-system';
      div.textContent = text;
      document.getElementById('messages').appendChild(div);
      const area = document.querySelector('.messages-area');
      area.scrollTop = area.scrollHeight;
    }

    function startCountdown(durationMs) {
      countdownEnd = Date.now() + durationMs;
      clearInterval(countdownInterval);
      updateCountdown();
      countdownInterval = setInterval(updateCountdown, 1000);
    }

    function updateCountdown() {
      const remaining = Math.max(0, countdownEnd - Date.now());
      const minutes = Math.floor(remaining / 60000);
      const seconds = Math.floor((remaining % 60000) / 1000);
      document.getElementById('countdown-text').textContent =
        `剩余 ${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;

      const el = document.getElementById('countdown');
      if (remaining < 60000) el.classList.add('urgent');
      else el.classList.remove('urgent');

      if (remaining <= 0) clearInterval(countdownInterval);
    }

    function goHome() {
      history.pushState(null, '', '/');
      showScreen('home-screen');
    }
  </script>
